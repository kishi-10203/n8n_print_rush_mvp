version: "3.9"

services:
  n8n:
    build:
      context: .
      dockerfile: Dockerfile
    image: custom-n8n:1.111.0
    container_name: printrush_n8n_server
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      # =====================================================
      # TIMEZONE
      # =====================================================
      TZ: Asia/Kolkata
      GENERIC_TIMEZONE: Asia/Kolkata

      # =====================================================
      # CORE
      # =====================================================
      N8N_HOST: 0.0.0.0
      N8N_PORT: 5678
      N8N_PROTOCOL: http

      # =====================================================
      # SECURITY
      # =====================================================
      N8N_ENCRYPTION_KEY: REPLACE_WITH_SECURE_RANDOM_KEY

      # =====================================================
      # EXECUTION
      # =====================================================
      EXECUTIONS_MODE: regular
      EXECUTIONS_DATA_PRUNE: "true"
      EXECUTIONS_DATA_MAX_AGE: 168

      # =====================================================
      # LOGGING
      # =====================================================
      N8N_LOG_LEVEL: info

      # =====================================================
      # OPTIONAL
      # =====================================================
      N8N_DIAGNOSTICS_ENABLED: "false"
    volumes:
      # -----------------------------------------------------
      # Main n8n persistent data
      # -----------------------------------------------------
      - ./n8n_data:/home/node/.n8n

      # -----------------------------------------------------
      # Workflow exports / backups
      # -----------------------------------------------------
      - ./workflows:/workflows

      # -----------------------------------------------------
      # PDFs / scripts / temp files
      # -----------------------------------------------------
      - ./files:/files
    networks:
      - n8n_network
    healthcheck:
      test:
        ["CMD", "wget", "--spider", "-q", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

networks:
  n8n_network:
    driver: bridge

