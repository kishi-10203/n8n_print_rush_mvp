version: "3.9"

services:
  n8n:
    image: n8nio/n8n:1.111.0
    container_name: n8n_explorer_1
    restart: unless-stopped

    ports:
      - "5678:5678"

    environment:
      # Core
      - TZ=Asia/Kolkata
      - GENERIC_TIMEZONE=Asia/Kolkata

      # Encryption
      - N8N_ENCRYPTION_KEY=123456789abcdef123456789abcdef

      # Production mode
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http

      # Task runners
      - N8N_RUNNERS_ENABLED=true
      - N8N_RUNNERS_MODE=external
      - N8N_RUNNERS_BROKER_LISTEN_ADDRESS=0.0.0.0
      - N8N_RUNNERS_AUTH_TOKEN=123456789abcdef

      # Native python
      - N8N_NATIVE_PYTHON_RUNNER=true

      # Recommended
      - EXECUTIONS_MODE=regular
      - EXECUTIONS_DATA_PRUNE=true
      - EXECUTIONS_DATA_MAX_AGE=168

    volumes:
      - n8n_data:/home/node/.n8n

    networks:
      - n8n_network

  task-runners:
    image: n8nio/runners:1.111.0
    container_name: n8n-runners
    restart: unless-stopped

    depends_on:
      - n8n

    environment:
      - N8N_RUNNERS_TASK_BROKER_URI=http://n8n_explorer_1:5679
      - N8N_RUNNERS_AUTH_TOKEN=123456789abcdef

    networks:
      - n8n_network

volumes:
  n8n_data:

networks:
  n8n_network: